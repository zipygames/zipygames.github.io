<footer>
    <style>
        :root {
            --neon-color: #00eaff;
            --bg-dark: #111;
            --text-light: #fff;
            --primary: #00eaff;
        }

        footer {
            background: var(--bg-dark);
        }

        svg.zigzag-top {
            width:100%;
            height:10px;
        }
        polyline {
            fill:none;
            stroke:var(--neon-color);
            stroke-width:2;
            filter:drop-shadow(0 0 1px var(--neon-color));
        }

        .footer-container {
            display:flex;
            justify-content:space-between;
            flex-wrap:wrap;
            padding:25px 20px;
            gap:15px;
        }
        .footer-left { flex:1 1 300px; display:flex; flex-direction:column; gap:10px; text-align:left; }
        .footer-right { flex:2 1 300px; display:flex; gap:20px; flex-wrap:wrap; }
        .footer-column { flex:1 1 150px; display:flex; flex-direction:column; gap:5px; }
        .footer-column h4 { font-size:0.9rem; color:#aaa; margin-bottom:8px; text-transform:uppercase; font-family: 'Orbitron', Arial, sans-serif; }
        .footer-column a {
            color:var(--text-light);
            text-decoration:none;
            margin:5px 0;
            font-weight:600;
            transition:color 0.3s;
            font-family: 'Orbitron', Arial, sans-serif;
        }
        .footer-column a:hover { color:var(--primary); }

        .footer-socials { display:flex; gap:12px; margin-top:10px; flex-wrap:wrap; }
        .footer-socials .social-icon { width:32px; height:32px; border-radius:50%; transition:transform 0.3s; }
        .footer-socials .social-icon:hover { transform:scale(1.2); }

        .footer-bottom {
            text-align:center;
            margin-top:30px;
            margin-bottom:20px;
            font-size:0.85rem;
            color:#aaa;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        @media(max-width:768px){
            .footer-container { flex-direction: column; align-items: flex-start; }
            .footer-left { text-align: left; margin-bottom: 20px; }
            .footer-right { flex:1 1 100%; text-align:center; justify-content:center; gap:15px; }
            .footer-column { flex:1 1 45%; text-align:center; margin-bottom:10px; }
        }

        @media(max-width:480px){
            .footer-column { flex:1 1 100%; }
        }
    </style>

    <svg class="zigzag-top" viewBox="0 0 100 10" preserveAspectRatio="none">
        <polyline points="0,10 10,0 20,10 30,0 40,10 50,0 60,10 70,0 80,10 90,0 100,10" />
    </svg>

    <div class="footer-container">
        <div class="footer-left">
            <div class="brand">
                <img src="assets/logo.png" class="logo-img" alt="ZIPY GAMES Logo">
                <h2 class="company-name">ZIPY GAMES</h2>
            </div>
            <p class="dev-company">Developed by Microbuzz Tech</p>
            <div class="footer-socials">
                <a href="#"><img src="assets/facebook.png" class="social-icon" alt="Facebook"></a>
                <a href="#"><img src="assets/twitter.png" class="social-icon" alt="Twitter"></a>
            </div>
        </div>

        <div class="footer-right">
            <div class="footer-column">
                <h4>Get To Know Us</h4>
                <a href="#">About</a>
            </div>
            <div class="footer-column">
                <h4>Privacy and Terms</h4>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms</a>
            </div>
            <div class="footer-column">
                <h4>Help and Support</h4>
                <a href="#">Contact</a>
            </div>
        </div>
    </div>

    <p class="footer-bottom">&copy; <span id="currentYear"></span> ZIPY GAMES. All rights reserved.</p>
    <p class="footer-bottom">Managed by Microbuzz Tech</p>

    <script>
        // Update the year dynamically
        const yearSpan = document.getElementById('currentYear');
        if(yearSpan){
            yearSpan.textContent = new Date().getFullYear();
        }
    </script>

</footer>
